<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Analista KDM — Urgencias Sobredimensión</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bhp-orange: #E05E1B; --bhp-dark: #1A1A1A; --bhp-gray: #6B6B6B;
  --bhp-light: #F5F4F1; --bhp-white: #FFFFFF; --bhp-border: #E0DDD8;
  --bhp-error: #C0392B; --kdm-green: #1D6338;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bhp-light); color: var(--bhp-dark); min-height: 100vh; }

/* LOGIN */
.login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
.login-card { background: var(--bhp-white); border: 1px solid var(--bhp-border); border-radius: 12px; padding: 2.5rem 2rem; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.07); }
.login-header { text-align: center; margin-bottom: 2rem; }
.login-logo { display: flex; align-items: center; justify-content: center; gap: 0.75rem; margin-bottom: 1.25rem; }
.logo-sep { width: 1px; height: 24px; background: var(--bhp-border); }
.login-role-badge { display: inline-block; background: #E8F5EE; color: var(--kdm-green); font-size: 0.7rem; font-weight: 600; padding: 0.2rem 0.7rem; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.75rem; border: 1px solid #A8D8B8; }
.login-header h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; }
.login-header p { font-size: 0.82rem; color: var(--bhp-gray); }
.field { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 1rem; }
label { font-size: 0.78rem; font-weight: 500; }
input[type="email"], input[type="password"], input[type="text"], textarea {
  width: 100%; padding: 0.65rem 0.85rem; border: 1.5px solid var(--bhp-border); border-radius: 6px;
  font-family: 'DM Sans', sans-serif; font-size: 0.875rem; background: var(--bhp-white); transition: border-color 0.15s;
}
input:focus, textarea:focus { outline: none; border-color: var(--kdm-green); box-shadow: 0 0 0 3px rgba(29,99,56,0.1); }
textarea { resize: vertical; min-height: 80px; }
.btn-primary { width: 100%; background: var(--kdm-green); color: white; border: none; border-radius: 8px; padding: 0.85rem; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.15s; margin-top: 0.5rem; }
.btn-primary:hover { background: #155228; }
.login-error { background: #FEE; border: 1px solid #F5C6C6; border-radius: 6px; padding: 0.65rem 0.85rem; font-size: 0.8rem; color: var(--bhp-error); margin-bottom: 1rem; display: none; }
.login-error.visible { display: block; }

/* APP */
.app { display: none; }
.app.visible { display: block; }
.header { background: var(--bhp-white); border-bottom: 3px solid var(--kdm-green); padding: 0.9rem 1.5rem; display: flex; align-items: center; gap: 1rem; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.header-divider { width: 1px; height: 24px; background: var(--bhp-border); }
.header-section { font-size: 0.78rem; font-weight: 500; color: var(--bhp-gray); text-transform: uppercase; letter-spacing: 0.06em; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 1rem; }
.role-pill { background: #E8F5EE; color: var(--kdm-green); font-size: 0.7rem; font-weight: 600; padding: 0.25rem 0.75rem; border-radius: 20px; border: 1px solid #A8D8B8; text-transform: uppercase; }
.btn-logout { background: transparent; border: 1px solid var(--bhp-border); border-radius: 6px; padding: 0.35rem 0.75rem; font-family: 'DM Sans', sans-serif; font-size: 0.75rem; color: var(--bhp-gray); cursor: pointer; transition: all 0.15s; }
.btn-logout:hover { border-color: var(--bhp-error); color: var(--bhp-error); }

/* KPI BAR */
.kpi-bar { background: var(--bhp-white); border-bottom: 1px solid var(--bhp-border); }
.kpi-inner { max-width: 960px; margin: 0 auto; padding: 1.25rem 1.5rem; display: grid; grid-template-columns: repeat(6, 1fr); gap: 0.75rem; }
.kpi-card { background: var(--bhp-light); border: 1px solid var(--bhp-border); border-radius: 10px; padding: 0.9rem 1rem; display: flex; flex-direction: column; gap: 0.25rem; }
.kpi-card.highlight { background: #E8F5EE; border-color: #A8D8B8; }
.kpi-card.warn { background: #FFF8E8; border-color: #F5DFA0; }
.kpi-card.alert { background: #FFF3ED; border-color: #F5C6A0; }
.kpi-label { font-size: 0.62rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--bhp-gray); }
.kpi-value { font-family: 'DM Mono', monospace; font-size: 1.4rem; font-weight: 600; color: var(--bhp-dark); line-height: 1; }
.kpi-card.highlight .kpi-value { color: var(--kdm-green); }
.kpi-card.warn .kpi-value { color: #92610A; }
.kpi-card.alert .kpi-value { color: #C05010; }
.kpi-sub { font-size: 0.68rem; color: var(--bhp-gray); }
@media (max-width: 700px) { .kpi-inner { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 420px) { .kpi-inner { grid-template-columns: repeat(2, 1fr); } }

/* CONTAINER & TABS */
.container { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }
.tabs { display: flex; gap: 0.25rem; margin-bottom: 1.5rem; border-bottom: 2px solid var(--bhp-border); }
.tab { padding: 0.6rem 1.1rem; font-size: 0.82rem; font-weight: 500; color: var(--bhp-gray); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; display: flex; align-items: center; gap: 0.4rem; }
.tab:hover { color: var(--bhp-dark); }
.tab.active { color: var(--kdm-green); border-bottom-color: var(--kdm-green); }
.tab-badge { background: var(--kdm-green); color: white; font-size: 0.65rem; font-weight: 700; padding: 0.1rem 0.45rem; border-radius: 20px; min-width: 18px; text-align: center; }
.tab-badge.gray { background: var(--bhp-border); color: var(--bhp-gray); }

/* CARDS */
.urg-card { background: var(--bhp-white); border: 1px solid var(--bhp-border); border-radius: 10px; margin-bottom: 0.75rem; cursor: pointer; transition: box-shadow 0.15s, transform 0.1s; display: flex; align-items: center; padding: 1rem 1.25rem; gap: 1rem; }
.urg-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); transform: translateY(-1px); }
.urg-card-info { flex: 1; min-width: 0; }
.urg-id { font-family: 'DM Mono', monospace; font-size: 0.9rem; font-weight: 500; color: var(--kdm-green); }
.urg-meta { font-size: 0.78rem; color: var(--bhp-gray); margin-top: 0.2rem; }
.urg-badges { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; flex-shrink: 0; }
.status-pill { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.25rem 0.65rem; border-radius: 20px; }
.status-pill.despachado_ferrovial { background: #E8F0FF; color: #2A5BA8; border: 1px solid #B0C8FF; }
.status-pill.completado { background: #E8F5EE; color: var(--kdm-green); border: 1px solid #A8D8B8; }
.escolta-pill { background: #FFF8E8; color: #92610A; border: 1px solid #F5DFA0; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.25rem 0.65rem; border-radius: 20px; }
.card-arrow { color: var(--bhp-gray); font-size: 1.2rem; flex-shrink: 0; }

/* RESUMEN TABLE */
.resumen-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--bhp-border); }
.resumen-table { width: 100%; border-collapse: collapse; background: #fff; font-size: 0.82rem; }
.resumen-table thead tr { background: #1A1A1A; color: #fff; }
.resumen-table th { padding: 0.75rem 1rem; text-align: left; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
.resumen-table tbody tr { border-top: 1px solid var(--bhp-border); cursor: pointer; transition: background 0.1s; }
.resumen-table tbody tr:nth-child(even) { background: #FAFAF8; }
.resumen-table tbody tr:hover { background: #EFF7F2; }
.resumen-table td { padding: 0.65rem 1rem; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: flex-start; justify-content: center; padding: 1.5rem 1rem 2rem; overflow-y: auto; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.visible { opacity: 1; pointer-events: all; }
.modal { background: var(--bhp-white); border-radius: 14px; width: 100%; max-width: 780px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); display: flex; flex-direction: column; max-height: calc(100vh - 3rem); transform: translateY(20px); transition: transform 0.2s; }
.modal-overlay.visible .modal { transform: translateY(0); }

.modal-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--bhp-border); display: flex; align-items: center; gap: 1rem; flex-shrink: 0; }
.modal-header-title { flex: 1; }
.modal-num { font-family: 'DM Mono', monospace; font-size: 1.1rem; font-weight: 600; color: var(--kdm-green); }
.modal-close { background: none; border: 1px solid var(--bhp-border); border-radius: 6px; width: 32px; height: 32px; font-size: 1rem; cursor: pointer; color: var(--bhp-gray); transition: all 0.15s; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.modal-close:hover { border-color: var(--bhp-error); color: var(--bhp-error); }

.modal-body { padding: 1.5rem; overflow-y: auto; flex: 1; }

.modal-section { margin-bottom: 1.75rem; }
.modal-section:last-child { margin-bottom: 0; }
.modal-section-title { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--bhp-gray); border-bottom: 1px solid var(--bhp-border); padding-bottom: 0.5rem; margin-bottom: 1rem; }

.info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.85rem; }
.info-item label { font-size: 0.62rem; color: var(--bhp-gray); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 0.2rem; }
.info-item span { font-size: 0.85rem; color: var(--bhp-dark); }
.info-full { grid-column: 1 / -1; }

.medidas-alert { background: #FFFBE0; border: 1px solid #F0D840; border-radius: 6px; padding: 0.85rem 1rem; margin-bottom: 1rem; font-size: 0.85rem; color: #5A4A00; }
.escolta-alert { background: #FFF8E8; border: 1px solid #F5DFA0; border-radius: 6px; padding: 0.85rem 1rem; margin-bottom: 1rem; font-size: 0.85rem; color: #7A5000; font-weight: 600; }
.obs-sup-box { background: #FFF8E8; border: 1px solid #F5DFA0; border-radius: 6px; padding: 0.65rem 0.85rem; }
.obs-sup-box label { color: #92610A !important; }

.ferrovial-box { background: #1A1A1A; border-radius: 8px; padding: 1.1rem 1.25rem; }
.ferrovial-box-title { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #FFD100; margin-bottom: 0.75rem; }
.ferrovial-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
.ferrovial-item label { font-size: 0.62rem; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 0.15rem; }
.ferrovial-item span { font-size: 0.82rem; color: rgba(255,255,255,0.9); font-family: 'DM Mono', monospace; }
.ferrovial-full { grid-column: 1 / -1; }
.traz-line { font-size: 0.75rem; color: var(--bhp-gray); padding: 0.5rem 0 0; }
.traz-line strong { color: var(--kdm-green); font-family: 'DM Mono', monospace; }

.kdm-closure-box { background: #E8F5EE; border: 1px solid #A8D8B8; border-radius: 8px; padding: 1rem 1.25rem; }
.kdm-closure-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 0.75rem; }
.kdm-closure-item label { font-size: 0.62rem; color: #155228; text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 0.15rem; font-weight: 600; }
.kdm-closure-item span { font-size: 0.85rem; color: #0F3D22; font-weight: 500; }
.respaldo-link { display: inline-flex; align-items: center; gap: 0.4rem; background: var(--kdm-green); color: white; border-radius: 5px; padding: 0.4rem 0.85rem; font-size: 0.8rem; font-weight: 600; text-decoration: none; }
.respaldo-link:hover { background: #155228; }

/* HISTORIAL */
.historial { position: relative; padding-left: 2rem; }
.historial::before { content: ''; position: absolute; left: 0.65rem; top: 0.6rem; bottom: 0.6rem; width: 2px; background: var(--bhp-border); }
.hist-event { position: relative; margin-bottom: 1.25rem; }
.hist-event:last-child { margin-bottom: 0; }
.hist-dot { position: absolute; left: -1.65rem; top: 0.1rem; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; border: 2px solid var(--bhp-white); }
.hist-date { font-size: 0.7rem; color: var(--bhp-gray); font-family: 'DM Mono', monospace; margin-bottom: 0.15rem; }
.hist-title { font-size: 0.85rem; font-weight: 600; color: var(--bhp-dark); margin-bottom: 0.2rem; }
.hist-detail { font-size: 0.78rem; color: var(--bhp-gray); }

/* MODAL FOOTER */
.modal-footer { border-top: 2px solid var(--bhp-border); padding: 1.25rem 1.5rem; background: #FAFAF8; flex-shrink: 0; }
.modal-footer-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--bhp-gray); margin-bottom: 1rem; }
.alerta-directa { background: #FFF3ED; border: 2px solid var(--bhp-orange); border-radius: 8px; padding: 0.85rem 1rem; margin-bottom: 1rem; font-size: 0.82rem; color: #7A3010; }
.alerta-directa strong { display: block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--bhp-orange); margin-bottom: 0.2rem; }
.action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
.action-grid .field { margin: 0; }
.drop-zone-sm { border: 2px dashed var(--bhp-border); border-radius: 8px; padding: 1rem; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; margin-bottom: 1rem; }
.drop-zone-sm:hover, .drop-zone-sm.drag-over { border-color: var(--kdm-green); background: #F0F7F3; }
.drop-zone-sm input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.drop-zone-sm .drop-txt { font-size: 0.82rem; color: var(--bhp-gray); }
.drop-zone-sm .drop-txt span { color: var(--kdm-green); text-decoration: underline; }
.drop-zone-sm .file-ok { font-size: 0.82rem; color: var(--kdm-green); font-weight: 600; }
.btn-complete { background: var(--kdm-green); color: white; border: none; border-radius: 6px; padding: 0.75rem 1.5rem; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.15s; width: 100%; }
.btn-complete:hover { background: #155228; }
.btn-complete:disabled { background: #9CAE9E; cursor: not-allowed; }

.empty-state { text-align: center; padding: 4rem 2rem; }
.empty-state p { color: var(--bhp-gray); font-size: 0.9rem; }
.loading-state { text-align: center; padding: 3rem; color: var(--bhp-gray); }

@media (max-width: 600px) {
  .info-grid, .ferrovial-grid, .kdm-closure-grid, .action-grid { grid-template-columns: 1fr; }
  .info-full, .ferrovial-full { grid-column: span 1; }
}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">
        <span style="font-weight:600;font-size:1rem;">ESCONDIDA</span>
        <div class="logo-sep"></div>
        <span style="font-weight:600;font-size:1rem;color:#E05E1B;letter-spacing:0.05em;">BHP</span>
      </div>
      <div class="login-role-badge">Analista KDM · Sobredimensión</div>
      <h2>Acceso al Panel</h2>
      <p>Ingrese sus credenciales para continuar</p>
    </div>
    <div class="login-error" id="loginError">Credenciales incorrectas.</div>
    <div class="field"><label>Correo electrónico</label><input type="email" id="loginEmail" placeholder="correo@kdmindustrial.cl" /></div>
    <div class="field"><label>Contraseña</label><input type="password" id="loginPass" placeholder="••••••••" /></div>
    <button class="btn-primary" onclick="doLogin()">Ingresar</button>
  </div>
</div>

<div class="app" id="appScreen">
  <header class="header">
    <div style="display:flex;align-items:center;gap:0.6rem;">
      <span style="font-weight:600;font-size:1rem;">ESCONDIDA</span>
      <div class="header-divider"></div>
      <span style="font-weight:600;font-size:1rem;color:#E05E1B;letter-spacing:0.05em;">BHP</span>
    </div>
    <div class="header-divider"></div>
    <span class="header-section">KDM · Rebaja Sobredimensión</span>
    <div class="header-right">
      <span class="role-pill">Analista KDM</span>
      <button class="btn-logout" onclick="doLogout()">Cerrar sesión</button>
    </div>
  </header>

  <div class="kpi-bar"><div class="kpi-inner" id="kpiBar"></div></div>

  <div class="container">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('despachado_ferrovial')" id="tab_despachado_ferrovial">
        Pendiente rebaja <span class="tab-badge" id="badge_despachado_ferrovial">0</span>
      </div>
      <div class="tab" onclick="switchTab('completado')" id="tab_completado">
        Completados <span class="tab-badge gray" id="badge_completado">0</span>
      </div>
      <div class="tab" onclick="switchTab('resumen')" id="tab_resumen">
        Resumen general <span class="tab-badge gray" id="badge_resumen">0</span>
      </div>
    </div>
    <div id="loadingState" class="loading-state">Cargando urgencias...</div>
    <div id="listaUrgencias"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-header-title">
        <div class="modal-num" id="modalNum">—</div>
        <div id="modalPill" style="margin-top:0.3rem;"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter" style="display:none"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://dnsijobpjnirbfrlkwfq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_kUxJua1oS2c-YxCyHjhEbg_bItcFg6H';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const VALID_USERS = {
  'analista@kdmindustrial.cl': 'kdm2024kdm',
  'rvergara@kdmindustrial.cl': 'kdm2024',
  'supervisorbhpa@kdmindustrial.cl': 'kdm2024sup',
  'jarayaa@kdmindustrial.cl': 'kdm2024sup'
};

let currentTab = 'despachado_ferrovial';
let allUrgencias = [];
let modalUrgId   = null;
let selectedFile = null;

// ── AUTH ──────────────────────────────────────────────────────────────
function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  if (VALID_USERS[email] === pass) {
    sessionStorage.setItem('sobred_kdm_session', JSON.stringify({ email }));
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').classList.add('visible');
    loadUrgencias();
  } else {
    document.getElementById('loginError').classList.add('visible');
  }
}
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogout() {
  sessionStorage.removeItem('sobred_kdm_session');
  allUrgencias = [];
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appScreen').classList.remove('visible');
}

window.addEventListener('load', () => {
  const saved = sessionStorage.getItem('sobred_kdm_session');
  if (saved) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').classList.add('visible');
    loadUrgencias();
  }
});

// ── DATA ──────────────────────────────────────────────────────────────
async function loadUrgencias() {
  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('listaUrgencias').innerHTML = '';
  const { data } = await sb.from('urgencias').select('*')
    .eq('tipo', 'sobredimension')
    .order('created_at', { ascending: false });
  document.getElementById('loadingState').style.display = 'none';
  allUrgencias = data || [];
  updateBadges();
  renderKPIs();
  renderTab();
}

function fmtHoras(ms) {
  if (ms == null || isNaN(ms) || ms < 0) return '—';
  const h = ms / 3600000;
  if (h < 24) return h.toFixed(1) + ' h';
  return (h / 24).toFixed(1) + ' días';
}

function renderKPIs() {
  const total     = allUrgencias.length;
  const completadas = allUrgencias.filter(u => u.estado === 'completado');
  const pendientes  = allUrgencias.filter(u => u.estado === 'despachado_ferrovial').length;
  const conEscolta  = allUrgencias.filter(u => u.requiere_escolta === 'si').length;
  const pctComp     = total > 0 ? Math.round(completadas.length / total * 100) : 0;

  // Tiempo Despacho Ferrovial → Rebaja SAP (más fiable, ambas fechas existen)
  const tiemposRebaja = completadas
    .filter(u => u.ferrovial_at && u.kdm_completado_at)
    .map(u => new Date(u.kdm_completado_at) - new Date(u.ferrovial_at));
  const avgRebaja = tiemposRebaja.length
    ? tiemposRebaja.reduce((a, b) => a + b, 0) / tiemposRebaja.length : null;

  // Tiempo Total Ciclo: created_at → kdm_completado_at
  const tiemposCiclo = completadas
    .filter(u => u.kdm_completado_at)
    .map(u => new Date(u.kdm_completado_at) - new Date(u.created_at));
  const avgCiclo = tiemposCiclo.length
    ? tiemposCiclo.reduce((a, b) => a + b, 0) / tiemposCiclo.length : null;

  // Urgencia más reciente pendiente
  const masAntigua = allUrgencias
    .filter(u => u.estado === 'despachado_ferrovial' && u.ferrovial_at)
    .map(u => Date.now() - new Date(u.ferrovial_at))
    .sort((a, b) => b - a)[0] ?? null;

  const warnRebaja  = avgRebaja  != null && avgRebaja  > 48 * 3600000; // > 48h
  const warnPend    = masAntigua != null && masAntigua > 24 * 3600000; // > 24h en espera

  document.getElementById('kpiBar').innerHTML = `
    <div class="kpi-card${pctComp === 100 ? ' highlight' : ''}">
      <div class="kpi-label">Total Urgencias</div>
      <div class="kpi-value">${total}</div>
      <div class="kpi-sub">${completadas.length} completadas</div>
    </div>
    <div class="kpi-card${pendientes > 0 ? (warnPend ? ' alert' : ' warn') : ' highlight'}">
      <div class="kpi-label">Pendientes Rebaja</div>
      <div class="kpi-value">${pendientes}</div>
      <div class="kpi-sub">${pendientes === 0 ? 'Al día ✓' : 'Esperando cierre SAP'}</div>
    </div>
    <div class="kpi-card${pctComp >= 80 ? ' highlight' : pctComp >= 50 ? '' : ' warn'}">
      <div class="kpi-label">% Completadas</div>
      <div class="kpi-value">${pctComp}%</div>
      <div class="kpi-sub">${completadas.length} de ${total}</div>
    </div>
    <div class="kpi-card${warnRebaja ? ' alert' : avgRebaja != null ? ' highlight' : ''}">
      <div class="kpi-label">Tiempo Despacho → Rebaja</div>
      <div class="kpi-value">${fmtHoras(avgRebaja)}</div>
      <div class="kpi-sub">Promedio ${tiemposRebaja.length} urgencias</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Tiempo Total Ciclo</div>
      <div class="kpi-value">${fmtHoras(avgCiclo)}</div>
      <div class="kpi-sub">Solicitud → Rebaja SAP</div>
    </div>
    <div class="kpi-card${conEscolta > 0 ? ' warn' : ''}">
      <div class="kpi-label">Con Escolta</div>
      <div class="kpi-value">${conEscolta}</div>
      <div class="kpi-sub">${total > 0 ? Math.round(conEscolta / total * 100) : 0}% del total</div>
    </div>`;
}

function updateBadges() {
  const pend = allUrgencias.filter(u => u.estado === 'despachado_ferrovial').length;
  const comp = allUrgencias.filter(u => u.estado === 'completado').length;
  document.getElementById('badge_despachado_ferrovial').textContent = pend;
  document.getElementById('badge_completado').textContent = comp;
  document.getElementById('badge_resumen').textContent = allUrgencias.length;
  document.getElementById('badge_completado').className = comp > 0 ? 'tab-badge' : 'tab-badge gray';
  document.getElementById('badge_resumen').className = allUrgencias.length > 0 ? 'tab-badge' : 'tab-badge gray';
}

function estadoLabel(s) {
  return { pendiente_si:'Pend. aprobación SI', rechazada_si:'Rechazada SI',
    pendiente_aprobacion:'Pend. Supervisor BHP', en_correccion:'En corrección',
    aprobado_supervisor:'Aprobado Supervisor', rechazado_supervisor:'Rechazado Supervisor',
    despachado_ferrovial:'Despachado Ferrovial', completado:'Rebaja completada' }[s] || s;
}

function estadoPillHtml(s) {
  const map = {
    pendiente_si:'background:#F3F0FF;color:#5B21B6;border-color:#C4B5FD',
    rechazada_si:'background:#FEE;color:#C0392B;border-color:#F5C6C6',
    pendiente_aprobacion:'background:#FFF8E8;color:#92610A;border-color:#F5DFA0',
    en_correccion:'background:#FFF8E8;color:#B45309;border-color:#FCD34D',
    aprobado_supervisor:'background:#FFFBE0;color:#8A6E00;border-color:#F0D840',
    rechazado_supervisor:'background:#FEE;color:#C0392B;border-color:#F5C6C6',
    despachado_ferrovial:'background:#E8F0FF;color:#2A5BA8;border-color:#B0C8FF',
    completado:'background:#E8F5EE;color:#1D6338;border-color:#A8D8B8',

// ── TABS ──────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab_' + tab).classList.add('active');
  renderTab();
}

function renderTab() {
  const lista = document.getElementById('listaUrgencias');
  lista.innerHTML = '';
  if (currentTab === 'resumen') { renderResumen(lista); return; }

  const filtered = allUrgencias.filter(u => u.estado === currentTab);
  if (!filtered.length) {
    lista.innerHTML = `<div class="empty-state"><p>📭 No hay urgencias en este estado.</p></div>`;
    return;
  }
  filtered.forEach(u => {
    const num   = u.numero_urg || ('SOBRED-' + String(u.id).slice(0, 8));
    const fecha = new Date(u.created_at).toLocaleString('es-CL');
    const escoltaBadge = u.requiere_escolta === 'si' ? `<span class="escolta-pill">🚨 Escolta</span>` : '';
    const label = u.estado === 'completado' ? 'Rebaja completada' : 'Pendiente rebaja';
    const div = document.createElement('div');
    div.className = 'urg-card';
    div.onclick = () => openModal(u.id);
    div.innerHTML = `
      <div class="urg-card-info">
        <div class="urg-id">${num}</div>
        <div class="urg-meta">${u.nombre_proveedor || '—'} · ${u.gerencia || '—'} · ${fecha}</div>
      </div>
      <div class="urg-badges">
        ${escoltaBadge}
        <span class="status-pill ${u.estado}">${label}</span>
      </div>
      <span class="card-arrow">›</span>`;
    lista.appendChild(div);
  });
}

function renderResumen(lista) {
  if (!allUrgencias.length) {
    lista.innerHTML = `<div class="empty-state"><p>📭 No hay urgencias registradas.</p></div>`;
    return;
  }
  const wrap = document.createElement('div');
  wrap.className = 'resumen-wrap';
  wrap.innerHTML = `
    <table class="resumen-table">
      <thead><tr>
        <th>N° Urgencia</th><th>Fecha</th><th>Gerencia</th><th>Proveedor</th>
        <th>PO / Ítems</th><th>Escolta</th><th>Estado</th><th>OST N°</th><th>SAP 261</th>
      </tr></thead>
      <tbody>
        ${allUrgencias.map(u => {
          const num   = u.numero_urg || ('SOBRED-' + String(u.id).slice(0, 8));
          const fecha = u.fecha_solicitud || new Date(u.created_at).toLocaleDateString('es-CL');
          return `<tr onclick="openModal('${u.id}')">
            <td style="font-family:'DM Mono',monospace;color:#1D6338;font-weight:500;">${num}</td>
            <td style="white-space:nowrap;">${fecha}</td>

// ── MODAL ──────────────────────────────────────────────────────────────
function openModal(id) {
  const u = allUrgencias.find(x => x.id === id || String(x.id) === String(id));
  if (!u) return;
  modalUrgId   = u.id;
  selectedFile = null;

  const num = u.numero_urg || ('SOBRED-' + String(u.id).slice(0, 8));
  document.getElementById('modalNum').textContent  = num;
  document.getElementById('modalPill').innerHTML   = estadoPillHtml(u.estado);
  document.getElementById('modalBody').innerHTML   = buildModalBody(u, num);

  const footer = document.getElementById('modalFooter');
  if (u.estado === 'despachado_ferrovial') {
    footer.style.display = 'block';
    footer.innerHTML = buildFooter();
  } else {
    footer.style.display = 'none';
  }

  document.getElementById('modalOverlay').classList.add('visible');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('visible');
  document.body.style.overflow = '';
  modalUrgId = null; selectedFile = null;
}
function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

function buildHistorialSection(u) {
  const events = [];

  events.push({ date: u.created_at, icon:'📝', bg:'#F3F0FF', color:'#5B21B6',
    title:'Solicitud creada',
    detail:`${u.nombre_solicitante || 'Solicitante'} · ${u.gerencia || ''}` });

  if (u.estado === 'rechazada_si') {
    events.push({ date:null, icon:'❌', bg:'#FEE', color:'#C0392B', title:'Rechazada por SI', detail:'' });
  } else if (!['pendiente_si'].includes(u.estado)) {
    events.push({ date:null, icon:'✅', bg:'#E8F5EE', color:'#1D6338',
      title:'Aprobada por SI', detail: u.nombre_si || '' });
  }

  if (u.estado === 'en_correccion') {
    events.push({ date:null, icon:'🔄', bg:'#FFF8E8', color:'#B45309',
      title:'Enviada a corrección por Supervisor BHP', detail: u.obs_supervisor || '' });
  } else if (u.estado === 'rechazado_supervisor') {
    events.push({ date:null, icon:'❌', bg:'#FEE', color:'#C0392B',
      title:'Rechazada por Supervisor BHP', detail: u.obs_supervisor || '' });
  } else if (['aprobado_supervisor','despachado_ferrovial','completado'].includes(u.estado)) {
    events.push({ date:null, icon:'✅', bg:'#FFFBE0', color:'#8A6E00',
      title:'Aprobada por Supervisor BHP', detail: u.obs_supervisor || '' });
  }

  if (u.ost_numero || u.ferrovial_at) {
    events.push({ date: u.ferrovial_at, icon:'🚛', bg:'#E8F0FF', color:'#2A5BA8',
      title:'Despachado por Ferrovial',
      detail:`OST N° ${u.ost_numero || '—'}${u.ost_tramo ? ' · ' + u.ost_tramo : ''}` });
  }

  if (u.kdm_completado_at) {
    events.push({ date: u.kdm_completado_at, icon:'✅', bg:'#E8F5EE', color:'#1D6338',
      title:'Rebaja completada en sistema',
      detail:`SAP 261: ${u.sap_mov261 || '—'} · Guía: ${u.guia_despacho || '—'}` });
  }

  const html = events.map(ev => `
    <div class="hist-event">
      <div class="hist-dot" style="background:${ev.bg};color:${ev.color};">${ev.icon}</div>
      ${ev.date ? `<div class="hist-date">${new Date(ev.date).toLocaleString('es-CL')}</div>` : ''}
      <div class="hist-title">${ev.title}</div>
      ${ev.detail ? `<div class="hist-detail">${ev.detail}</div>` : ''}
    </div>`).join('');

  return `
    <div class="modal-section">
      <div class="modal-section-title">Historial de movimientos</div>
      <div class="historial">${html}</div>
    </div>`;
}

function buildFooter() {
  return `
    <div class="modal-footer-title">Confirmar Rebaja en Sistema</div>
    <div class="alerta-directa">
      <strong>⚡ Entrega directa a cliente — sin paso por P3</strong>
      Ferrovial entrega directamente al área solicitante. KDM solo realiza la rebaja sistémica y carga el archivo de respaldo.
    </div>
    <div class="action-grid">
      <div class="field">
        <label>N° Movimiento SAP 261 *</label>
        <input type="text" id="modal_sap" placeholder="Ej: 4900012345" />
      </div>
      <div class="field">
        <label>N° Guía de Despacho *</label>
        <input type="text" id="modal_guia" placeholder="Guía del proveedor" />
      </div>
    </div>
    <div class="drop-zone-sm" id="dropZoneRespaldo"
      ondragover="event.preventDefault();this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="onDropRespaldo(event)">
      <div id="dropTextRespaldo"><div class="drop-txt">📎 Arrastra el archivo de respaldo o <span>haz clic para adjuntar</span> *</div></div>
      <input type="file" accept=".pdf,image/*" onchange="onFileRespaldo(this)" />
    </div>
    <button class="btn-complete" onclick="completar()">✓ Confirmar Rebaja en Sistema</button>`;
}

function onDropRespaldo(e) {
  e.preventDefault();
  document.getElementById('dropZoneRespaldo').classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f) setRespaldo(f);
}
function onFileRespaldo(input) { if (input.files[0]) setRespaldo(input.files[0]); }
function setRespaldo(file) {
  selectedFile = file;
  const name = file.name.length > 50 ? file.name.slice(0, 48) + '…' : file.name;
  document.getElementById('dropTextRespaldo').innerHTML = `<div class="file-ok">✓ ${name}</div>`;
}

// ── COMPLETAR ──────────────────────────────────────────────────────────
async function completar() {
  const sap  = document.getElementById('modal_sap')?.value?.trim()  || '';
  const guia = document.getElementById('modal_guia')?.value?.trim() || '';
  if (!sap)          { alert('Ingrese el N° de Movimiento SAP 261 antes de confirmar.'); return; }
  if (!guia)         { alert('Ingrese el N° de Guía de Despacho antes de confirmar.'); return; }
  if (!selectedFile) { alert('Debe cargar el archivo de respaldo antes de confirmar.'); return; }

  const btn = document.querySelector('.btn-complete');
  btn.disabled = true;
  btn.textContent = 'Guardando...';

  let respaldo_url = null;
  try {
    const ext  = selectedFile.name.split('.').pop();
    const path = `${modalUrgId}/${Date.now()}.${ext}`;
    const { error: upErr } = await sb.storage.from('sobred-respaldos').upload(path, selectedFile, { upsert: true });
    if (!upErr) {
      const { data: urlData } = sb.storage.from('sobred-respaldos').getPublicUrl(path);
      respaldo_url = urlData?.publicUrl || null;
    }
  } catch (_) {}

  const { error } = await sb.from('urgencias').update({
    estado:            'completado',
    sap_mov261:        sap,
    guia_despacho:     guia,
    respaldo_url,
    kdm_completado_at: new Date().toISOString()
  }).eq('id', modalUrgId);

  if (!error) {
    await fetch(`${SUPABASE_URL}/functions/v1/send-email`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}` },
      body: JSON.stringify({ urgencia_id: modalUrgId, tipo: 'sobredimension', evento: 'completado' })
    }).catch(() => {});
    closeModal();
    loadUrgencias();
  } else {
    alert('Error: ' + error.message);
    btn.disabled = false;
    btn.textContent = '✓ Confirmar Rebaja en Sistema';
  }
}
</script>
</body>
</html>
